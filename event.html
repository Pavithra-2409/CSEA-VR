<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        
        .transition-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            pointer-events: none;
            opacity: 1;
            transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body.loaded .transition-overlay {
            opacity: 0;
        }
        
        .carousel.no-transition .list .item,
        .carousel.no-transition .list .item .category,
        .carousel.no-transition .list .item h2,
        .carousel.no-transition .list .item .description,
        .carousel.no-transition .list .item .more,
        .carousel.no-transition .list .item figure img {
            transition: none !important;
            animation: none !important;
        }
        
        .carousel.no-transition .list .item.active {
            opacity: 1 !important;
            transform: translateX(0) !important;
        }
        .carousel.no-transition .list .item.active .category,
        .carousel.no-transition .list .item.active h2,
        .carousel.no-transition .list .item.active .description,
        .carousel.no-transition .list .item.active .more {
            opacity: 1 !important;
            transform: translateX(0) !important;
        }
        
        .carousel.no-transition .list .item:not(.active) {
            opacity: 0 !important;
            transform: translateX(0) !important;
        }

        
        
        .item.straight-float.active figure img {
            transform: rotate(0deg) !important;
        }
        
        .item.straight-float figure img {
            transform: rotate(0deg) !important;
        }

        
        @keyframes dept-float {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-18px); }
        }

        
        .item.straight-float.active figure {
            animation: dept-float 3.2s ease-in-out infinite;
            animation-delay: 0.9s;
        }

        
        .item:not(.active).straight-float figure {
            animation: none;
        }
    </style>
</head>
<body>
    <div class="transition-overlay"></div>
    <header>
        <figure class="logo" style="display: flex; align-items: center; gap: 10px;">
            <img src="img/psg_logo.png" alt="PSG Logo" style="height: 50px; width: auto; object-fit: contain;">
            <div style="display: flex; flex-direction: column; justify-content: center; font-family: 'Poppins', sans-serif;">
                <span style="color: #2b55a1; font-weight: 800; font-size: 1.2rem; line-height: 1.1; letter-spacing: 0.5px;">PSG</span>
                <span style="color: #2b55a1; font-weight: 800; font-size: 1rem; line-height: 1.1;">College of Technology</span>
            </div>
        </figure>
        <nav>
            <ul style="color: #fff; font-weight: bold; letter-spacing: 2px;">
                <li>PSG TECH SHOWCASE</li>
            </ul>
        </nav>
    </header>

    <section class="carousel">
        <div class="list" id="event-container">
            
        </div>
    </section>

    
    <a class="btn-back-home" id="btn-back-home" href="#">
        <span class="icon-circle"><i class="fa-solid fa-arrow-left"></i></span>
        Back to Home Page
    </a>

    <script>
        
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.body.classList.add('loaded');
            }, 100);
        });

        
        const eventDatabase = {
            '001': {
                category: 'Hackathon',
                title: 'CODE SPRINT 2026',
                description: 'Join the ultimate 24-hour hackathon hosted by the CSE department. Build innovative solutions, win exciting cash prizes, and get noticed by top tech recruiters!'
            },
            '002': {
                category: 'Guest Lecture',
                title: 'AI IN CYBERSECURITY',
                description: 'An exclusive session by industry experts on how AI is revolutionizing threat detection and ethical hacking. Open to all students.'
            },
            '003': {
                category: 'Workshop',
                title: 'WEB3 & BLOCKCHAIN',
                description: 'A hands-on workshop covering smart contracts, Ethereum, and decentralized apps. Prerequisite: Basic JavaScript.'
            },
            '004': {
                category: 'Cultural',
                title: 'CSE DEPARTMENT DAY',
                description: 'Celebrate our department with music, dance, drama, and the much-awaited award ceremony honoring top academic performers.'
            },
            '005': {
                category: 'Alumni Meet',
                title: 'TECH ALUMNI CONNECT',
                description: 'Network with our distinguished alumni currently working at Google, Microsoft, and Amazon. Learn from their journeys and secure mentorships.'
            }
        };

        
        let eventId = window.location.hash.replace('#', '') || '001';
        if (!eventDatabase[eventId]) { eventId = '001'; } 

        const ev = eventDatabase[eventId];

        
        const container = document.getElementById('event-container');
        container.innerHTML = `
            <div class="item active">
                <figure>
                    <img src="images/${eventId}.png">
                </figure>
                <div class="content">
                    <p class="category">${ev.category}</p>
                    <h2>${ev.title}</h2>
                    <p class="description">${ev.description}</p>
                    <div class="more">
                        <button>
                            <i class="fa-solid fa-arrow-right"></i> Register Now
                        </button>
                    </div>
                </div>
            </div>
        `;

        
        document.getElementById('btn-back-home').addEventListener('click', (e) => {
            e.preventDefault();
            const overlay = document.querySelector('.transition-overlay');
            overlay.style.transition = 'opacity 0.9s cubic-bezier(0.4, 0, 0.2, 1)';
            overlay.style.opacity = '1';
            overlay.style.pointerEvents = 'all';
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 950);
        });
    </script>
</body>
</html>
